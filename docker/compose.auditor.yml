# Auditor host stack (one 8xB200 box): 8 locus:auditor containers, each pinned
# to one GPU index, polling the audit job index and writing AuditResultV3
# objects back to the bucket. Plus one Watchtower.
#
# Each container runs `python -m bench.presigned_ssh_worker dispatch --role audit`
# (via entrypoint role=auditor-worker) which is itself a long-running loop until
# its --timeout-sec elapses or the container is killed.
#
# Required env on the remote (via /root/locus/.env):
#   DOCKER_USER, S3_BUCKET, S3_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#   LOCUS_NETUID (default 3),
#   AUDITOR_HK_0..AUDITOR_HK_7  (SS58 strings for the 8 auditor hotkeys),
#   AUDITOR_HK_NAME_0..AUDITOR_HK_NAME_7  (on-disk hotkey filenames),
#   LOCUS_OWNER_SECRET, LOCUS_MINER_SECRET, LOCUS_ASSIGNMENT_SECRET
#
# RUN_ID is optional: when unset, the image's baked LOCUS_BAKED_RUN_ID
# (set at `docker build --build-arg LOCUS_RUN_ID=...`) is used. Set RUN_ID
# in /root/locus/.env only when you need a per-host override.
name: locus-auditor

x-auditor-common: &auditor-common
  image: ${DOCKER_USER}/locus:auditor
  restart: always
  pull_policy: always
  runtime: nvidia
  volumes:
    - /root/.bittensor/wallets:/root/.bittensor/wallets:ro
  labels:
    - com.centurylinklabs.watchtower.enable=true

x-auditor-env: &auditor-env
  LOCUS_ROLE: auditor-worker
  S3_BUCKET: ${S3_BUCKET}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  LOCUS_OWNER_SECRET: ${LOCUS_OWNER_SECRET}
  LOCUS_MINER_SECRET: ${LOCUS_MINER_SECRET}
  LOCUS_ASSIGNMENT_SECRET: ${LOCUS_ASSIGNMENT_SECRET}
  # Match audit-jobs side: auditors aren't on chain, so dev (HMAC) crypto.
  LOCUS_ASSIGNMENT_CRYPTO: dev
  # Optional runtime run-id override. Empty/unset falls back to the
  # image-baked LOCUS_BAKED_RUN_ID (resolved in entrypoint.sh).
  LOCUS_RUN_ID: ${LOCUS_RUN_ID:-${RUN_ID:-}}
  BT_WALLET_PATH: /root/.bittensor/wallets
  BT_WALLET_NAME: ${AUDITOR_WALLET_NAME:-locus_mining}

services:
  auditor-gpu0:
    <<: *auditor-common
    container_name: locus-auditor-gpu0
    environment:
      <<: *auditor-env
      NVIDIA_VISIBLE_DEVICES: "0"
      BT_HOTKEY_NAME: ${AUDITOR_HK_NAME_0}
    command:
      - --netuid=${LOCUS_NETUID:-3}
      - --hotkey=${AUDITOR_HK_0}
      - --worker-id=auditor-gpu0
      - --device=cuda:0
      - --gpu-index=0
      - --assignment-secret=${LOCUS_ASSIGNMENT_SECRET}
      - --miner-secret=${LOCUS_MINER_SECRET}
      - --owner-secret=${LOCUS_OWNER_SECRET}
      - --s3-bucket=${S3_BUCKET}
      - --poll-interval=1
      - --timeout-sec=86400
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, device_ids: ["0"], capabilities: [gpu] }] } } }

  auditor-gpu1:
    <<: *auditor-common
    container_name: locus-auditor-gpu1
    environment:
      <<: *auditor-env
      NVIDIA_VISIBLE_DEVICES: "1"
      BT_HOTKEY_NAME: ${AUDITOR_HK_NAME_1}
    command:
      - --netuid=${LOCUS_NETUID:-3}
      - --hotkey=${AUDITOR_HK_1}
      - --worker-id=auditor-gpu1
      - --device=cuda:0
      - --gpu-index=0
      - --assignment-secret=${LOCUS_ASSIGNMENT_SECRET}
      - --miner-secret=${LOCUS_MINER_SECRET}
      - --owner-secret=${LOCUS_OWNER_SECRET}
      - --s3-bucket=${S3_BUCKET}
      - --poll-interval=1
      - --timeout-sec=86400
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, device_ids: ["1"], capabilities: [gpu] }] } } }

  auditor-gpu2:
