# Auditor host stack (one 8xB200 box): 8 teuton:auditor containers, each pinned
# to one GPU index, polling the audit job index and writing AuditResultV3
# objects back to the bucket. Plus one Watchtower.
#
# Each container runs `python -m bench.presigned_ssh_worker dispatch --role audit`
# (via entrypoint role=auditor-worker) which is itself a long-running loop until
# its --timeout-sec elapses or the container is killed.
#
# Required env on the remote (via /root/teuton/.env):
#   DOCKER_USER, S3_BUCKET, S3_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#   TEUTON_NETUID (default 3),
#   AUDITOR_HK_0..AUDITOR_HK_7  (SS58 strings for the 8 auditor hotkeys),
#   AUDITOR_HK_NAME_0..AUDITOR_HK_NAME_7  (on-disk hotkey filenames),
#   TEUTON_OWNER_SECRET, TEUTON_MINER_SECRET, TEUTON_ASSIGNMENT_SECRET
#
# RUN_ID is optional: when unset, the image's baked TEUTON_BAKED_RUN_ID
# (set at `docker build --build-arg TEUTON_RUN_ID=...`) is used. Set RUN_ID
# in /root/teuton/.env only when you need a per-host override.
name: teuton-auditor

x-auditor-common: &auditor-common
  image: ${DOCKER_USER}/teuton:auditor
  restart: always
  pull_policy: always
  runtime: nvidia
  volumes:
    - /root/.bittensor/wallets:/root/.bittensor/wallets:ro
  labels:
    - com.centurylinklabs.watchtower.enable=true

x-auditor-env: &auditor-env
  TEUTON_ROLE: auditor-worker
  S3_BUCKET: ${S3_BUCKET}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  TEUTON_OWNER_SECRET: ${TEUTON_OWNER_SECRET}
  TEUTON_MINER_SECRET: ${TEUTON_MINER_SECRET}
  TEUTON_ASSIGNMENT_SECRET: ${TEUTON_ASSIGNMENT_SECRET}
  # Match audit-jobs side: auditors aren't on chain, so dev (HMAC) crypto.
  TEUTON_ASSIGNMENT_CRYPTO: dev
  # Optional runtime run-id override. Empty/unset falls back to the
  # image-baked TEUTON_BAKED_RUN_ID (resolved in entrypoint.sh).
  TEUTON_RUN_ID: ${TEUTON_RUN_ID:-${RUN_ID:-}}
  BT_WALLET_PATH: /root/.bittensor/wallets
  BT_WALLET_NAME: ${AUDITOR_WALLET_NAME:-teuton_mining}

services:
  auditor-gpu0:
    <<: *auditor-common
    container_name: teuton-auditor-gpu0
    environment:
      <<: *auditor-env
      NVIDIA_VISIBLE_DEVICES: "0"
      BT_HOTKEY_NAME: ${AUDITOR_HK_NAME_0}
    command:
      - --netuid=${TEUTON_NETUID:-3}
      - --hotkey=${AUDITOR_HK_0}
      - --worker-id=auditor-gpu0
      - --device=cuda:0
      - --gpu-index=0
      - --assignment-secret=${TEUTON_ASSIGNMENT_SECRET}
      - --miner-secret=${TEUTON_MINER_SECRET}
      - --owner-secret=${TEUTON_OWNER_SECRET}
      - --s3-bucket=${S3_BUCKET}
      - --poll-interval=1
      - --timeout-sec=86400
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, device_ids: ["0"], capabilities: [gpu] }] } } }

  auditor-gpu1:
    <<: *auditor-common
    container_name: teuton-auditor-gpu1
    environment:
      <<: *auditor-env
      NVIDIA_VISIBLE_DEVICES: "1"
      BT_HOTKEY_NAME: ${AUDITOR_HK_NAME_1}
    command:
      - --netuid=${TEUTON_NETUID:-3}
      - --hotkey=${AUDITOR_HK_1}
      - --worker-id=auditor-gpu1
      - --device=cuda:0
      - --gpu-index=0
      - --assignment-secret=${TEUTON_ASSIGNMENT_SECRET}
      - --miner-secret=${TEUTON_MINER_SECRET}
      - --owner-secret=${TEUTON_OWNER_SECRET}
      - --s3-bucket=${S3_BUCKET}
      - --poll-interval=1
      - --timeout-sec=86400
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, device_ids: ["1"], capabilities: [gpu] }] } } }

  auditor-gpu2:
