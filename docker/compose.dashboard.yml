# Public Teuton dashboard stack:
#   discovery-ui  reads the bucket and serves the live fleet view on :8765
#   cloudflared   opens an outbound Cloudflare Tunnel and routes
#                 https://<HOSTNAME> -> http://discovery-ui:8765
#
# The host needs no inbound ports (8765 is bound only inside the docker
# network). cloudflared only makes outbound connections to Cloudflare's
# edge, so it works behind NAT / firewalls / DinD pods.
#
# Required env on the remote (via /root/teuton/.env):
#   DOCKER_USER, S3_BUCKET, S3_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#   TEUTON_NETUID (default 3), TEUTON_DASHBOARD_TUNNEL_TOKEN
#
# To set everything up the first time, run scripts/setup_cloudflare_dashboard.py
# locally with a Cloudflare API token; it creates the tunnel, the public
# hostname route, and the DNS record, then prints the tunnel token to drop
# into TEUTON_DASHBOARD_TUNNEL_TOKEN here.
name: teuton-dashboard

services:
  discovery-ui:
    image: ${DOCKER_USER}/teuton:miner
    container_name: teuton-dashboard-ui
    restart: always
    pull_policy: always
    environment:
      TEUTON_ROLE: shell
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    entrypoint:
      - teuton-v3
      - discovery-ui
    command:
      - --netuid=${TEUTON_NETUID:-3}
      - --host=0.0.0.0
      - --port=8765
      - --refresh-sec=${TEUTON_DASHBOARD_REFRESH_SEC:-3.0}
      - --snapshot-cache-sec=${TEUTON_DASHBOARD_CACHE_SEC:-1.5}
      - --max-jobs=${TEUTON_DASHBOARD_MAX_JOBS:-500}
      - --max-artifacts=${TEUTON_DASHBOARD_MAX_ARTIFACTS:-300}
      - --s3-bucket=${S3_BUCKET}
      - --s3-region=${S3_REGION:-us-east-1}
    expose:
      - "8765"
    networks:
      - dashboard
    labels:
      - com.centurylinklabs.watchtower.enable=true

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: teuton-dashboard-tunnel
    restart: always
    depends_on:
      - discovery-ui
    environment:
      TUNNEL_TOKEN: ${TEUTON_DASHBOARD_TUNNEL_TOKEN}
      TUNNEL_METRICS: "0.0.0.0:2000"
    command:
      - tunnel
      - --no-autoupdate
      - run
    networks:
      - dashboard
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:2000", "ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  watchtower:
    image: containrrr/watchtower:latest
    container_name: teuton-dashboard-watchtower
    restart: always
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "60"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_TIMEOUT: "30s"
      DOCKER_API_VERSION: "1.48"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    command:
      - --label-enable
      - --interval=60
      - --cleanup

networks:
  dashboard:
    name: teuton-dashboard
    driver: bridge
