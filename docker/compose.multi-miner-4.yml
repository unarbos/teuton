# Multi-miner stack for 4 active hotkeys on an 8-GPU host.
#
# This is intentionally separate from compose.multi-miner.yml, which defines
# gpu0..gpu7 and is used by the former auditor host. gentle-eagle-5c currently
# has only four assigned miner hotkeys, so this file avoids launching empty
# gpu4..gpu7 services.
name: teuton-miners

x-miner-common: &miner-common
  image: ${DOCKER_USER}/teuton:miner
  restart: always
  pull_policy: always
  runtime: nvidia
  volumes:
    - /root/.bittensor/wallets:/root/.bittensor/wallets:ro
  labels:
    - com.centurylinklabs.watchtower.enable=true

x-miner-env: &miner-env
  TEUTON_ROLE: miner
  S3_BUCKET: ${S3_BUCKET}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  TEUTON_OWNER_HOTKEY: ${TEUTON_OWNER_HOTKEY:-}
  TEUTON_ASSIGNMENT_CRYPTO: ${TEUTON_ASSIGNMENT_CRYPTO:-ed25519}
  TEUTON_AUDIT_ELIGIBLE_HOTKEYS: ${TEUTON_AUDIT_ELIGIBLE_HOTKEYS:-}
  TEUTON_RUN_ID: ${TEUTON_RUN_ID:-${RUN_ID:-}}
  BT_WALLET_PATH: /root/.bittensor/wallets
  BT_WALLET_NAME: ${MINER_WALLET_NAME:-teuton_mining}

services:
  miner-gpu0:
    <<: *miner-common
    container_name: teuton-miner-gpu0
    environment:
      <<: *miner-env
      NVIDIA_VISIBLE_DEVICES: "0"
      BT_HOTKEY_NAME: ${MINER_HK_NAME_0}
    command:
      - --netuid=${TEUTON_NETUID:-3}
      - --hotkey=${MINER_HK_SS58_0}
      - --devices=cuda:0
      - --wallet-path=/root/.bittensor/wallets
      - --wallet-name=${MINER_WALLET_NAME:-teuton_mining}
      - --hotkey-name=${MINER_HK_NAME_0}
      - --grant-mode=presigned
      - --assignment-crypto=ed25519
      - --discovery-backend=bucket
      - --poll-interval=0.05
      - --s3-bucket=${S3_BUCKET}
      - --s3-region=${S3_REGION:-us-east-1}
      - --audit-eligible-hotkeys=${TEUTON_AUDIT_ELIGIBLE_HOTKEYS:-}
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, device_ids: ["0"], capabilities: [gpu] }] } } }

  miner-gpu1:
    <<: *miner-common
    container_name: teuton-miner-gpu1
    environment:
      <<: *miner-env
      NVIDIA_VISIBLE_DEVICES: "1"
      BT_HOTKEY_NAME: ${MINER_HK_NAME_1}
    command:
      - --netuid=${TEUTON_NETUID:-3}
      - --hotkey=${MINER_HK_SS58_1}
      - --devices=cuda:0
      - --wallet-path=/root/.bittensor/wallets
      - --wallet-name=${MINER_WALLET_NAME:-teuton_mining}
      - --hotkey-name=${MINER_HK_NAME_1}
      - --grant-mode=presigned
      - --assignment-crypto=ed25519
      - --discovery-backend=bucket
      - --poll-interval=0.05
      - --s3-bucket=${S3_BUCKET}
      - --s3-region=${S3_REGION:-us-east-1}
      - --audit-eligible-hotkeys=${TEUTON_AUDIT_ELIGIBLE_HOTKEYS:-}
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, device_ids: ["1"], capabilities: [gpu] }] } } }

  miner-gpu2:
    <<: *miner-common
    container_name: teuton-miner-gpu2
    environment:
      <<: *miner-env
      NVIDIA_VISIBLE_DEVICES: "2"
      BT_HOTKEY_NAME: ${MINER_HK_NAME_2}
    command:
      - --netuid=${TEUTON_NETUID:-3}
      - --hotkey=${MINER_HK_SS58_2}
      - --devices=cuda:0
      - --wallet-path=/root/.bittensor/wallets
      - --wallet-name=${MINER_WALLET_NAME:-teuton_mining}
      - --hotkey-name=${MINER_HK_NAME_2}
      - --grant-mode=presigned
      - --assignment-crypto=ed25519
      - --discovery-backend=bucket
      - --poll-interval=0.05
      - --s3-bucket=${S3_BUCKET}
      - --s3-region=${S3_REGION:-us-east-1}
      - --audit-eligible-hotkeys=${TEUTON_AUDIT_ELIGIBLE_HOTKEYS:-}
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, device_ids: ["2"], capabilities: [gpu] }] } } }

  miner-gpu3:
    <<: *miner-common
    container_name: teuton-miner-gpu3
    environment:
      <<: *miner-env
      NVIDIA_VISIBLE_DEVICES: "3"
      BT_HOTKEY_NAME: ${MINER_HK_NAME_3}
    command:
      - --netuid=${TEUTON_NETUID:-3}
      - --hotkey=${MINER_HK_SS58_3}
      - --devices=cuda:0
      - --wallet-path=/root/.bittensor/wallets
      - --wallet-name=${MINER_WALLET_NAME:-teuton_mining}
      - --hotkey-name=${MINER_HK_NAME_3}
      - --grant-mode=presigned
      - --assignment-crypto=ed25519
      - --discovery-backend=bucket
      - --poll-interval=0.05
      - --s3-bucket=${S3_BUCKET}
      - --s3-region=${S3_REGION:-us-east-1}
      - --audit-eligible-hotkeys=${TEUTON_AUDIT_ELIGIBLE_HOTKEYS:-}
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, device_ids: ["3"], capabilities: [gpu] }] } } }

  watchtower:
    image: containrrr/watchtower:latest
    container_name: teuton-miners-watchtower
    restart: always
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "60"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      DOCKER_API_VERSION: "1.48"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    command:
      - --label-enable
      - --interval=60
      - --cleanup
