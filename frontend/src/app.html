<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Teutonic</title>
        <link rel="icon" type="image/png" href="/teutonic.png" />
        <script>
            // Apply theme before paint to avoid flash. Reads localStorage; falls
            // back to the system preference. Body is hidden via CSS until JS
            // sets the attribute.
            try {
                const saved = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.dataset.theme = saved ? saved : prefersDark ? 'dark' : 'light';
            } catch (_) {
                document.documentElement.dataset.theme = 'light';
            }
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
